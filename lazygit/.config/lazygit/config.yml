gui:
  # Match the single-border aesthetic used across the nvim UI.
  border: single
  theme:
    activeBorderColor:
      - "#61afef"
      - bold
    inactiveBorderColor:
      - "#545862"
    searchingActiveBorderColor:
      - "#d19a66"
    optionsTextColor:
      - "#61afef"
    selectedLineBgColor:
      - "#3e4451"
    cherryPickedCommitBgColor:
      - "#545862"
    cherryPickedCommitFgColor:
      - "#61afef"
    markedBaseCommitFgColor:
      - "#61afef"
    unstagedChangesColor:
      - "#e06c75"
    defaultFgColor:
      - "#abb2bf"
# Don't prompt to create a repo when launched outside one — just skip.
notARepository: skip
os:
  # `e` opens the selected file in nvim (built-in preset).
  editPreset: nvim
git:
  overrideGpg: true
  paging:
    colorArg: always
    # OneHalfDark tracks the One Dark palette used above; TwoDark clashed.
    pager: delta --dark --paging=never --syntax-theme OneHalfDark -s
